# /etc/nginx/conf.d/finnish.conf  (after install-nginx.sh)
#
# Single-server nginx site for the Finnish Learning demo. Three jobs:
#   1. Serve the React SPA from /var/www/finnish/dist (built by deploy/build.sh,
#      uploaded by deploy/deploy.sh).
#   2. Reverse-proxy /api/ and /uploads/ to the Spring Boot backend on
#      127.0.0.1:8080.
#   3. Fall back to index.html for any unmatched path so React Router can handle
#      client-side routes (e.g. /dashboard, /topics/3, /quiz/3).
#
# Public listener: 80 (HTTP only — no TLS for the demo). The EC2 Security Group
# only opens 22 (SSH) and 80 (HTTP). Postgres, Kafka, and the JVM listen on
# 127.0.0.1 and are not reachable from the internet.
#
# default_server: We commented out the stock default server in
# /etc/nginx/nginx.conf, so we can safely claim default_server here without a
# "duplicate default server" emerg. Claiming it means this block answers any
# Host: header — convenient because the EC2 public DNS changes every time you
# stop+start the instance.

server {
    listen 80 default_server;
    listen [::]:80 default_server;
    server_name _;

    # Static SPA served from the directory rsync'd by deploy/deploy.sh.
    # The owning user is `nginx` (AL2023's nginx user — not `www-data`); TASK_08
    # uses rsync --chown=nginx:nginx to set ownership on upload.
    root /var/www/finnish/dist;
    index index.html;

    # Reasonable upload size for image attachments (LocalImageStorageService
    # accepts multipart/form-data). Default 1m would 413 on the first PNG.
    client_max_body_size 10m;

    # ──────────────────────────────────────────────────────────────────────
    # 1. Long-cache hashed assets.
    #
    # Vite emits files like assets/index-Q3pP_abc.js with content-hashed names.
    # Safe to cache forever because the filename changes whenever the content
    # changes. immutable tells the browser not to revalidate even on reload.
    # ──────────────────────────────────────────────────────────────────────
    location /assets/ {
        try_files $uri =404;
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ──────────────────────────────────────────────────────────────────────
    # 2. Backend API — reverse-proxy to Spring Boot.
    #
    # proxy_pass without a trailing slash, combined with `location /api/`,
    # passes the FULL URI (including `/api/`) to the backend. The backend's
    # controllers are mapped under /api/* (see backend/.../controller/), so the
    # path lines up perfectly.
    #
    # The X-Forwarded-* headers preserve the original client IP/scheme/host for
    # the backend's logs. The backend doesn't currently read them, but the cost
    # of setting them is zero and removes a footgun for any future TLS work.
    # ──────────────────────────────────────────────────────────────────────
    location /api/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        # 60s is plenty for a demo backend. Spring's default request timeout is
        # higher, so this is the binding ceiling. Bump if you ever add a slow
        # endpoint (long-running quiz analytics, etc.).
        proxy_read_timeout 60s;
        proxy_connect_timeout 5s;
    }

    # ──────────────────────────────────────────────────────────────────────
    # 3. Image bytes served by the backend (LocalImageStorageService).
    #
    # Could be served directly by nginx from IMAGE_STORAGE_LOCATION
    # (/var/lib/finnish/uploads) — but that would require nginx read access to
    # that path, plus SELinux relabelling. Proxying through the backend keeps
    # the authorisation surface in one place (Spring Security) and one less
    # SELinux rule to maintain. Performance cost is negligible for a demo.
    # ──────────────────────────────────────────────────────────────────────
    location /uploads/ {
        proxy_pass         http://127.0.0.1:8080;
        proxy_http_version 1.1;
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
    }

    # ──────────────────────────────────────────────────────────────────────
    # 4. SPA fallback.
    #
    # try_files first tries to serve $uri as a literal file (e.g. /favicon.ico,
    # /robots.txt). If nothing matches, it returns /index.html so React Router
    # can resolve the route client-side. Without this block, deep links like
    # http://<host>/dashboard would 404.
    #
    # Caching: leave at nginx default (no Cache-Control). index.html is tiny
    # and updates with every deploy — caching it would mask deploys.
    # ──────────────────────────────────────────────────────────────────────
    location / {
        try_files $uri /index.html;
    }

    # Basic access/error logging. Default file paths on AL2023.
    access_log /var/log/nginx/finnish.access.log;
    error_log  /var/log/nginx/finnish.error.log warn;
}
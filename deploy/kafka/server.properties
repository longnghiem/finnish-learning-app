# Single-node KRaft Kafka config for the Finnish Learning app deployment.
#
# Notes:
#   - One process plays both broker and controller roles (process.roles=broker,controller).
#   - Listeners are loopback-only by design. The broker is consumed only by the
#     local Spring Boot process; exposing it to the public internet would be
#     a serious risk for a demo with no auth on the broker.
#   - Replication factors are 1 because there is exactly one broker.
#   - Cluster id (bcyctWRKT921wWzPY1JhaA) is hard-coded in install-install-kafka.sh so
#     the dev docker-compose stack and the deployed broker share the same id —
#     mainly a debugging convenience.

process.roles=broker,controller
node.id=1
controller.quorum.voters=1@127.0.0.1:9093
listeners=PLAINTEXT://127.0.0.1:9092,CONTROLLER://127.0.0.1:9093
advertised.listeners=PLAINTEXT://127.0.0.1:9092
inter.broker.listener.name=PLAINTEXT
controller.listener.names=CONTROLLER
listener.security.protocol.map=CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT
log.dirs=/var/lib/kafka
offsets.topic.replication.factor=1
transaction.state.log.replication.factor=1
transaction.state.log.min.isr=1
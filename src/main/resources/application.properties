spring.application.name=finnish-learning-backend

# Datasource
spring.datasource.url=${SPRING_DATASOURCE_URL:jdbc:postgresql://localhost:5532/finnish_learning_app}
spring.datasource.username=${SPRING_DATASOURCE_USERNAME:postgres}
spring.datasource.password=${SPRING_DATASOURCE_PASSWORD:postgres}

# Flyway
spring.flyway.enabled=true
spring.flyway.locations=classpath:db/migration

# JOOQ
spring.jooq.sql-dialect=POSTGRES

# Multipart (image uploads)
spring.servlet.multipart.enabled=true
spring.servlet.multipart.max-file-size=10MB
spring.servlet.multipart.max-request-size=15MB

# Image storage
app.storage.location=${IMAGE_STORAGE_LOCATION:./uploads}

# SpringDoc OpenAPI
springdoc.api-docs.path=/api-docs
springdoc.swagger-ui.path=/swagger-ui.html

# JWT
app.jwt.secret=${JWT_SECRET:default-dev-secret-that-is-at-least-256-bits-long-for-hs256!!}
app.jwt.expiration-ms=${JWT_EXPIRATION_MS:86400000}

# Kafka
spring.kafka.bootstrap-servers=${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
spring.kafka.consumer.group-id=finnish-learning-app
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=me.longng.finnish_learning_backend.*